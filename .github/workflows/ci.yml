name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# All version pins live here.
env:
  RUST_TOOLCHAIN: nightly-2026-02-07
  CHARON_REV:    bb585116362158a68b2633ce871951d520a50e13
  AENEAS_REV:    3c9b490747294eb39a6e830930d44b5902c60d39
  # Where the cache step stages the charon / aeneas binaries.
  AENEAS_DIR: ${{ github.workspace }}/.tools/aeneas

jobs:
  # ---------------------------------------------------------------- formatting
  rust-fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - run: cargo fmt --all -- --check

  # ---------------------------------------------------------------- rust tests
  rust-test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - run: cargo test --workspace

  # ----------------------------------------------------------- lean extraction
  lean-build:
    name: aeneas extraction + lake build
    runs-on: ubuntu-latest
    needs: [rust-fmt]   # don't waste cycles on a formatting-broken PR
    steps:
      - uses: actions/checkout@v4

      # ---- Rust toolchain (needed to compile the workspace; charon's
      # nix-built binary brings its own pinned rustc but `cargo` itself
      # must still be on PATH so charon's cargo-wrapping can intercept
      # the compile of `core-models/` and the `tests/` crate).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      # ---- Cache: charon + aeneas binaries (built from source, slow) ------
      # Use restore + save (instead of the combined `actions/cache@v4`)
      # so the save runs unconditionally — including when a *later* step
      # like the diff-check fails. The combined action skips its save on
      # job failure, which means a single bad diff would force every
      # subsequent run to rebuild charon + aeneas from scratch.
      - name: Restore cached charon + aeneas binaries
        id: cache-tools
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.AENEAS_DIR }}
          key: aeneas-${{ runner.os }}-${{ env.CHARON_REV }}-${{ env.AENEAS_REV }}

      # ---- Build charon + aeneas via the upstream nix flakes -------------
      # Both projects officially support only Nix; rolling our own opam
      # install pulled 100+ Jane Street packages and hit core_unix build
      # failures. Nix evaluates the pinned flake, builds in a sandbox,
      # and we copy the resulting binaries out.
      - name: Install Nix
        if: steps.cache-tools.outputs.cache-hit != 'true'
        uses: cachix/install-nix-action@v27

      # Cache the Nix store between runs. Even when CHARON_REV / AENEAS_REV
      # change, most of the dependency graph (ocaml, nixpkgs deps, opam libs)
      # is identical — only the charon/aeneas-specific derivations are
      # rebuilt. `restore-prefixes-first-match` lets a fresh-rev run reuse
      # the closest prior store; the post-job save then overlays the new
      # paths into the cache for the next run.
      - name: Cache Nix store
        if: steps.cache-tools.outputs.cache-hit != 'true'
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ env.CHARON_REV }}-${{ env.AENEAS_REV }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # Save the store even when a later step (e.g. the diff-check)
          # fails — same reasoning as the binary cache split above.
          save-always: true

      - name: Build charon (cache miss)
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p $AENEAS_DIR/charon/bin
          charon_out=$(nix build --print-out-paths --no-link \
            "github:AeneasVerif/charon/$CHARON_REV#charon")
          cp -L "$charon_out"/bin/* $AENEAS_DIR/charon/bin/

      - name: Build aeneas (cache miss)
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p $AENEAS_DIR/bin
          aeneas_out=$(nix build --print-out-paths --no-link \
            "github:AeneasVerif/aeneas/$AENEAS_REV#aeneas")
          cp -L "$aeneas_out"/bin/aeneas $AENEAS_DIR/bin/aeneas

      - name: Save charon + aeneas binaries
        # `if: always()` so the binaries we just built persist even if a
        # later step (e.g. the extraction diff-check) fails.
        if: always() && steps.cache-tools.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.AENEAS_DIR }}
          key: aeneas-${{ runner.os }}-${{ env.CHARON_REV }}-${{ env.AENEAS_REV }}

      # ---- Lean toolchain ------------------------------------------------
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean / mathlib build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mathlib
            lean/.lake
            tests/lean/.lake
          key: lean-${{ runner.os }}-${{ hashFiles('lean/lean-toolchain') }}-${{ hashFiles('lean/lakefile.toml') }}

      # ---- Cache cargo too ----------------------------------------------
      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-lean-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      # ---- The actual pipeline ------------------------------------------
      - name: Extract + build parent Lean library
        run: make CHARON=$AENEAS_DIR/charon/bin/charon AENEAS=$AENEAS_DIR/bin/aeneas lean

      - name: Run regression tests
        run: make CHARON=$AENEAS_DIR/charon/bin/charon AENEAS=$AENEAS_DIR/bin/aeneas tests

      # ---- Enforce that committed extraction matches re-extraction ------
      # If this fails: someone changed Rust source / patcher without
      # re-running `make lean` and committing the resulting diff.
      - name: Committed extraction must match a fresh re-extraction
        run: |
          git diff --exit-code -- \
            lean/Aeneas/Funs.lean \
            lean/Aeneas/Types.lean \
            lean/Aeneas/FunsExternal_Template.lean \
            lean/Aeneas/TypesExternal_Template.lean \
            lean/Aeneas/Alloc/Funs.lean \
            lean/Aeneas/Alloc/Types.lean
