name = "AeneasTest"
version = "0.1.0"
defaultTargets = ["AeneasTest"]

[[lean_lib]]
name = "AeneasTest"
# Aeneas writes AeneasTest/Funs.lean and AeneasTest/Types.lean, with no
# `AeneasTest.lean` wrapper. Tell Lake which modules form the library.
roots = [
  "AeneasTest.Funs",
  "AeneasTest.Types",
  "AeneasTest.FunsExternal",
  "AeneasTest.TypesExternal",
]

[[require]]
name = "Aeneas"
path = "../../lean"
