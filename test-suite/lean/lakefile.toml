name = "TestSuite"
version = "0.1.0"
defaultTargets = ["TestSuite"]

[[lean_lib]]
name = "TestSuite"
# Aeneas writes TestSuite/Funs.lean and TestSuite/Types.lean, with no
# `TestSuite.lean` wrapper. Tell Lake which modules form the library.
roots = [
  "TestSuite.Funs",
  "TestSuite.Types",
  "TestSuite.FunsExternal",
  "TestSuite.TypesExternal",
]

[[require]]
name = "Aeneas"
path = "../../lean"
